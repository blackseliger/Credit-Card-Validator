<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="CreditCardsForm">
        <form action="" class="creditCardValidator" data-id="form-validation">
            <div class="form">
                <div class="collageCards">
                    <div class="cardImg discover opacityImg" data-id="discover"></div>
                    <div class="cardImg jcb opacityImg" data-id="jcb"></div>
                    <div class="cardImg masterCard opacityImg" data-id="masterCard"></div>
                    <div class="cardImg mir opacityImg" data-id="mir"></div>
                    <div class="cardImg visa opacityImg" data-id="visa"></div>
                </div>
                <div class="form-input">
                    <label>
                        <span class="formHint">Введите номер карты</span>
                        <input type="text" class="field" data-id="card-input" placeholder="1111...">
                    </label>
                    <div class="blockMessageValid">
                        <span class="validMessage hiddenValid" data-id=""></span>
                    </div>
                    <div class="form-button">
                        <button class="button" data-id="form-button">Подтвердить</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
